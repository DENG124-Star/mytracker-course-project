{% extends 'base.html' %}

{% block title %}Delete Budget - Expense Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Delete Budget</h1>
</div>

<div class="confirm-card">
    <p>Are you sure you want to delete the budget for <strong>{{ budget.month }}/{{ budget.year }}</strong>?</p>
    <div class="budget-details">
        <p><strong>Limit:</strong> ${{ budget.limit_amount }}</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <div class="form-actions">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'budget_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
