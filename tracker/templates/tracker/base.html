{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MyTracker{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'tracker/css/style.css' %}">
</head>
<body class="app-bg">

    {% block navbar %}
    <nav class="navbar navbar-dark app-navbar">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'tracker:dashboard' %}">MyTracker</a>
        </div>
    </nav>
    {% endblock %}

    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
